# ─────────────────────────────────────────────────────────────────────────────
# NGINX Configuration — Mini CDN Entry Layer
# Acts as the public-facing reverse proxy. All client traffic enters here.
# Forwards to the Python Load Balancer (port 8080).
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format cdn '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'upstream="$upstream_addr" '
                   'cache="$upstream_http_x_cache" '
                   'rt=$request_time';

    access_log /var/log/nginx/access.log cdn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/html text/css application/json;

    # ── Upstream: Python Load Balancer ───────────────────────────────────────
    upstream cdn_load_balancer {
        server 127.0.0.1:8080;

        # If you want NGINX itself to round-robin multiple LB instances:
        # server 127.0.0.1:8081 backup;

        keepalive 16;
    }

    # ── Rate Limiting Zone (optional) ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=cdn_limit:10m rate=50r/s;

    # ── Main Server Block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost cdn.local;

        # Increase timeouts for slow origin fetches
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;

        # Pass real client IP to backend
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;

        # ── Content Delivery (main CDN path) ─────────────────────────────
        location /get/ {
            limit_req zone=cdn_limit burst=20 nodelay;
            proxy_pass http://cdn_load_balancer;

            # Add CDN headers
            add_header X-Served-By "mini-cdn-nginx";
            add_header X-Cache     $upstream_http_x_cache;
        }

        # ── Cache Invalidation API ────────────────────────────────────────
        location /invalidate {
            # Restrict invalidation to internal networks only
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://cdn_load_balancer;
        }

        # ── Metrics API (exposed to all) ──────────────────────────────────
        location /metrics {
            proxy_pass http://127.0.0.1:9000;  # Route directly to metrics server
            add_header Content-Type application/json;
        }

        # ── Load Balancer Stats ───────────────────────────────────────────
        location /lb/ {
            proxy_pass http://cdn_load_balancer/;
        }

        # ── NGINX status (internal monitoring) ───────────────────────────
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            deny all;
        }

        # ── Health check ─────────────────────────────────────────────────
        location /health {
            proxy_pass http://cdn_load_balancer;
        }

        # ── Default 404 ───────────────────────────────────────────────────
        error_page 404 /404.json;
        location = /404.json {
            return 404 '{"error": "Not Found", "server": "mini-cdn"}';
            add_header Content-Type application/json;
        }

        # ── 503 when no backend ───────────────────────────────────────────
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            return 503 '{"error": "CDN temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
